name: Gate 6 repository inventory audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact isolated head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Verify branch and live isolation
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee gate6-head-before.txt
          git rev-parse origin/main | tee gate6-main-head-before.txt
          test "$(git rev-parse origin/main)" = "d896165380191e4b9876f2ea99386808c937ec8a"
      - name: Inventory exact tracked tree and runtime layers
        run: |
          set -euo pipefail
          git ls-tree -r --name-only HEAD | sort | tee gate6-tree-before.txt
          find . -maxdepth 1 -type f -printf '%f\n' | sort | tee gate6-root-files-before.txt
          find .github/workflows -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort | tee gate6-workflows-before.txt
          git ls-files '*.js' '*.mjs' '*.html' '*.css' | while read -r file; do
            case "$file" in
              app/*|scripts/*|tests/*) ;;
              *) printf '%s\n' "$file" ;;
            esac
          done | sort | tee gate6-noncanonical-runtime-candidates-before.txt
          grep -RInE 'MutationObserver|setTimeout\(|setInterval\(|show-legs-label-fix|historical|dashboard-refresh|dashboard-sort-filter|ticket-dashboard|renderTicketDashboard|loadRecordIntoBuilder|saveCurrentTicket' \
            --include='*.js' --include='*.html' --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=build . \
            | sort > gate6-repair-signatures-before.txt || true
          node <<'NODE' > gate6-canonical-dependency-map-before.txt
          const fs=require('fs');
          const template=fs.readFileSync('app/src/index.template.html','utf8');
          const refs=[...template.matchAll(/<(?:script|link)[^>]+(?:src|href)="\.\/([^"]+)"/g)].map(match=>match[1]);
          console.log(refs.join('\n'));
          NODE
          test -s gate6-noncanonical-runtime-candidates-before.txt
      - name: Verify canonical suite before removal
        run: |
          npm ci
          npx playwright install --with-deps chromium webkit
          npm test
      - name: Upload Gate 6 pre-removal inventory
        uses: actions/upload-artifact@v4
        with:
          name: gate6-pre-removal-inventory
          retention-days: 90
          path: |
            gate6-head-before.txt
            gate6-main-head-before.txt
            gate6-tree-before.txt
            gate6-root-files-before.txt
            gate6-workflows-before.txt
            gate6-noncanonical-runtime-candidates-before.txt
            gate6-repair-signatures-before.txt
            gate6-canonical-dependency-map-before.txt
          if-no-files-found: error
