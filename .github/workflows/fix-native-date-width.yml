name: Apply native date width fix

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/fix-native-date-width.js
      - .github/workflows/fix-native-date-width.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply proven date containment CSS
        run: node .github/scripts/fix-native-date-width.js
      - name: Commit corrected date field width
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Contain native date fields within grid columns"
          git push