name: Fix automatic labels

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/fix-auto-labels-v14.js
      - .github/workflows/fix-auto-labels-v14.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply automatic label corrections
        run: node .github/scripts/fix-auto-labels-v14.js
      - name: Commit corrected label logic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Correct automatic labels across supported markets"
          git push
