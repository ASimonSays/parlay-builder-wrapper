name: Domain reference report

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: app
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: SuperL0ng/SuperL0ng.github.io
          path: root
          fetch-depth: 0
      - name: Build report
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          terms=('simonsportsbetting.com','simonsports.bet','superl0ng.github.io/parlay-tracker','raw.githubusercontent.com/SuperL0ng/parlay-tracker')
          out=[]
          for label,base in [('APP',Path('app')),('ROOT',Path('root'))]:
            out.append(f'===== {label} =====')
            for p in sorted(base.rglob('*')):
              if not p.is_file() or '.git' in p.parts or 'node_modules' in p.parts: continue
              try: text=p.read_text()
              except Exception: continue
              for i,line in enumerate(text.splitlines(),1):
                if any(t.lower() in line.lower() for t in terms):
                  out.append(f'{p.relative_to(base)}:{i}: {line}')
          Path('domain-reference-report.txt').write_text('\n'.join(out)+'\n')
          print(Path('domain-reference-report.txt').read_text())
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: domain-reference-report
          path: domain-reference-report.txt
          if-no-files-found: error
