name: Fix Phase 2 date restore

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/fix-phase2-date-restore-v20.js
      - .github/workflows/fix-phase2-date-restore-v20.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct saved-ticket date restore
        run: node .github/scripts/fix-phase2-date-restore-v20.js
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Fix saved-ticket date restoration"
          git push
