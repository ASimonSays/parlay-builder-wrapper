name: Apply Gate 3 settlement correction

on:
  push:
    branches:
      - agent/canonical-app-architecture
    paths:
      - .github/workflows/apply-gate3-settlement.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact staging commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Assemble and verify settlement source
        run: |
          set -euo pipefail
          cat .gate3/settlement.part00.txt .gate3/settlement.part01.txt .gate3/settlement.part02.txt .gate3/settlement.part03.txt > app/src/scripts/settlement-service.js
          echo '50bf23c4d19ee7f688fc794d70894900cf3f3a5dd34c7c2efbfb48c5b4c9a138  app/src/scripts/settlement-service.js' | sha256sum -c -
          node --check app/src/scripts/settlement-service.js
      - name: Run all Gate 3 contracts
        run: |
          set -euo pipefail
          node scripts/test-tracker-core-contract.mjs
          node scripts/test-tracker-sources-contract.mjs
          node scripts/test-tracker-evaluator-contract.mjs
          node scripts/test-tracker-service-contract.mjs
          node scripts/test-settlement-contract.mjs
          node scripts/test-tracker-market-coverage.mjs
          node scripts/test-canonical-doubleheader-binding.mjs
      - name: Commit verified correction and remove staging machinery
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/src/scripts/settlement-service.js
          git rm .gate3/settlement.part00.txt .gate3/settlement.part01.txt .gate3/settlement.part02.txt .gate3/settlement.part03.txt .github/workflows/apply-gate3-settlement.yml
          git commit -m 'Correct settlement contracts'
          git push origin HEAD:agent/canonical-app-architecture
