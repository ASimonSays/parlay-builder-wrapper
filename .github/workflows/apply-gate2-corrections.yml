name: Apply Gate 2 corrections

on:
  push:
    branches:
      - agent/canonical-app-architecture
    paths:
      - scripts/apply-gate2-corrections.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out isolated branch
        uses: actions/checkout@v4
        with:
          ref: agent/canonical-app-architecture
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply hash-guarded corrections
        run: python scripts/apply-gate2-corrections.py
      - name: Run complete canonical suite before commit
        run: npm test
      - name: Commit exact corrections
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/src/scripts/builder-controller.js scripts/test-storage-contract.mjs scripts/test-catalog-contract.mjs scripts/test-builder-contract.mjs
          test "$(git diff --cached --name-only | wc -l | tr -d ' ')" = 4
          git commit -m "Complete Gate 2 component contracts"
          git push origin HEAD:agent/canonical-app-architecture
