name: Gate 2 component audit

on:
  push:
    branches:
      - agent/canonical-app-architecture
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact audited commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify exact commit and branch isolation
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          test "$(git rev-parse HEAD)" = "$expected"
          git fetch origin main
          git diff --name-only origin/main...HEAD > changed-files.txt
          if grep -Ev '^(app/|architecture/|scripts/|package\.json$|\.github/workflows/gate2-component-audit\.yml$)' changed-files.txt; then
            echo 'Gate 2 branch changed a path outside the isolated replacement architecture.' >&2
            exit 1
          fi
      - name: Check canonical JavaScript syntax
        run: npm run check:syntax
      - name: Build gold and silver from canonical source
        run: npm run build
      - name: Verify canonical architecture
        run: npm run verify:architecture
      - name: Verify storage contract
        run: node scripts/test-storage-contract.mjs
      - name: Verify catalog contract
        run: node scripts/test-catalog-contract.mjs
      - name: Verify builder contract
        run: node scripts/test-builder-contract.mjs
      - name: Run canonical regression suite
        run: npm run test:regressions
      - name: Verify canonical hosting contract
        run: npm run verify:hosting
      - name: Verify integrated package pipeline
        run: npm test
      - name: Produce Gate 2 evidence
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > branch-head.txt
          git rev-parse origin/main > main-head.txt
          sha256sum app/src/scripts/storage.js app/src/scripts/catalog.js app/src/scripts/builder-controller.js scripts/test-storage-contract.mjs scripts/test-catalog-contract.mjs scripts/test-builder-contract.mjs package.json > gate2-components-sha256.txt
          find app/src scripts -type f -print0 | sort -z | xargs -0 sha256sum > gate2-source-manifest-sha256.txt
          find build -type f -print0 | sort -z | xargs -0 sha256sum > gate2-build-manifest-sha256.txt
          printf 'Gate 2 passed at %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > result.txt
      - name: Upload Gate 2 evidence
        uses: actions/upload-artifact@v4
        with:
          name: gate2-component-audit-evidence-final
          path: |
            branch-head.txt
            main-head.txt
            changed-files.txt
            gate2-components-sha256.txt
            gate2-source-manifest-sha256.txt
            gate2-build-manifest-sha256.txt
            result.txt
          if-no-files-found: error
