name: Gate 2 component audit

on:
  push:
    branches:
      - agent/canonical-app-architecture
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact audited commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify exact commit and isolation
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git rev-parse HEAD)" = "${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          git diff --name-only origin/main...HEAD > changed-files.txt
          if grep -Ev '^(app/|architecture/|scripts/|package\.json$|\.github/workflows/gate2-component-audit\.yml$)' changed-files.txt; then
            echo 'Gate 2 branch changed a path outside the isolated replacement architecture.' >&2
            exit 1
          fi
      - name: Run complete canonical test suite
        run: npm test
      - name: Capture Gate 2 evidence
        if: always()
        shell: bash
        run: |
          git rev-parse HEAD > branch-head.txt
          git rev-parse origin/main > main-head.txt
          sha256sum app/src/scripts/storage.js app/src/scripts/catalog.js app/src/scripts/builder-controller.js scripts/test-storage-contract.mjs scripts/test-catalog-contract.mjs scripts/test-builder-contract.mjs package.json > gate2-sha256.txt
          printf 'Gate 2 evidence captured at %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > result.txt
      - name: Upload Gate 2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate2-component-audit-evidence
          path: |
            branch-head.txt
            main-head.txt
            changed-files.txt
            gate2-sha256.txt
            result.txt
          if-no-files-found: error
