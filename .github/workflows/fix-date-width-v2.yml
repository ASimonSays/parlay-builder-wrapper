name: Fix native date width v2

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/fix-date-width-v2.js

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply proven Apps Script date containment CSS
        run: node .github/scripts/fix-date-width-v2.js
      - name: Commit corrected date width
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Restore proven iOS date width containment"
          git push
