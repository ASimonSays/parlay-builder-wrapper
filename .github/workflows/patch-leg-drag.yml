name: Apply builder stabilization fixes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/scripts/apply-builder-fixes-v7.js

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply builder patch
        run: node .github/scripts/apply-builder-fixes-v7.js
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Add dedicated leg reorder mode"
          git push