name: Patch leg drag reorder

on:
  push:
    paths:
      - '.github/workflows/patch-leg-drag.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        shell: python
        run: |
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace('.grip{color:#111820;border:1px solid rgba(105,116,130,.55);background:linear-gradient(180deg,#f8fbff,#d7dee8 48%,#7e8a99);cursor:pointer;user-select:none}', '.grip{color:#111820;border:1px solid rgba(105,116,130,.55);background:linear-gradient(180deg,#f8fbff,#d7dee8 48%,#7e8a99);cursor:grab;user-select:none;touch-action:none;-webkit-user-select:none}.leg.dragging{opacity:.78;filter:none;position:relative;z-index:20}.leg.dragTarget{box-shadow:0 -3px 0 #c89232}')
          text = text.replace('class="grip multiOnly" onclick="moveLeg(this)" title="Move leg"', 'class="grip multiOnly" title="Drag to reorder" aria-label="Drag to reorder leg"')
          marker = 'window.addEventListener("load",init);'
          drag_code = r'''let dragLeg=null,dragPointerId=null,dragStartY=0;
function beginLegDrag(e){const handle=e.target.closest('.grip');if(!handle||handle.classList.contains('hide'))return;const leg=handle.closest('.leg');if(!leg)return;e.preventDefault();dragLeg=leg;dragPointerId=e.pointerId;dragStartY=e.clientY;leg.classList.add('dragging');handle.setPointerCapture?.(e.pointerId);document.body.style.userSelect='none'}
function moveLegDrag(e){if(!dragLeg||e.pointerId!==dragPointerId)return;e.preventDefault();const siblings=[...document.querySelectorAll('#legs > .leg')].filter(x=>x!==dragLeg);let before=null;for(const item of siblings){const r=item.getBoundingClientRect();item.classList.remove('dragTarget');if(before===null&&e.clientY<r.top+r.height/2)before=item}if(before){before.classList.add('dragTarget');$('legs').insertBefore(dragLeg,before)}else{$('legs').appendChild(dragLeg)}}
function endLegDrag(e){if(!dragLeg||e.pointerId!==dragPointerId)return;e.preventDefault();document.querySelectorAll('.leg.dragTarget').forEach(x=>x.classList.remove('dragTarget'));dragLeg.classList.remove('dragging');dragLeg=null;dragPointerId=null;document.body.style.userSelect='';renumber();updateMultiControls();preview()}
document.addEventListener('pointerdown',beginLegDrag,{passive:false});document.addEventListener('pointermove',moveLegDrag,{passive:false});document.addEventListener('pointerup',endLegDrag,{passive:false});document.addEventListener('pointercancel',endLegDrag,{passive:false});window.addEventListener("load",init);'''
          if marker not in text:
              raise SystemExit('load marker not found')
          text = text.replace(marker, drag_code, 1)
          path.write_text(text, encoding='utf-8')
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Enable touch drag leg reordering"
          git push
