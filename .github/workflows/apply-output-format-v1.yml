name: Apply compact ticket output format

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/apply-output-format-v1.js
      - .github/workflows/apply-output-format-v1.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply output formatter patch
        run: node .github/scripts/apply-output-format-v1.js
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Use compact ticket output format"
          git push