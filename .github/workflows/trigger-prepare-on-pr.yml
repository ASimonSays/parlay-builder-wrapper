name: Trigger domain preparation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch preparation workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run prepare-domain-swap.yml --repo "$GITHUB_REPOSITORY" --ref main
