name: Gate 4 component audit

# Exact-head rerun after generated build cleanup.
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact audited commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify exact commit and branch isolation
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee gate4-head.txt
          git rev-parse origin/main | tee gate4-main-head.txt
          test "$(git rev-parse origin/main)" = "d896165380191e4b9876f2ea99386808c937ec8a"
          git diff --name-only origin/main...HEAD | tee gate4-changed-paths.txt
          bad="$(git diff --name-only origin/main...HEAD | grep -Ev '^(app/|scripts/|architecture/|package.json$|\.github/workflows/gate4-component-audit\.yml$)' || true)"
          test -z "$bad"
      - name: Verify exact Gate 4 source and contract hashes
        run: |
          set -euo pipefail
          cat > gate4-expected-sha256.txt <<'EOF'
          ab581ec1f05a5029eb247cf210456c3be6e334a54fd9ab8d0dd33dcd1d539574  app/src/scripts/builder-controller.js
          7ead09345f6b0c65cc14f450e3401665fdbbeff8e1069395cae81b0e4cd95826  app/src/scripts/sharing-controller.js
          9a15396bb6240e80812c5f9c7c04e34cb652f0683918f853b3aa19e17237691a  app/src/scripts/ticket-view-controller.js
          f5d95ee90a1a07e47a519a635ac3bdc6139afffd35a07b7bf492ee888b8b7170  app/src/scripts/dashboard-controller.js
          1ceb046de80502d6dcfc593d0d197223eaef9a0cc3d268eba4a59f43d93f72af  app/src/scripts/app-controller.js
          f72737bd9ee733df162760f4be82f01cef4b63aba3ead00a53ee6e63b6ffe567  app/src/scripts/bootstrap.js
          d9bf92ee32977f26489ae3eeee02f62ec3e27ace845b0aef8ab19d53339a6b86  package.json
          ae02f81c3d27af824852da6701e7aa80090f8c01086badfcd8365023e8e8be84  scripts/test-sharing-controller-contract.mjs
          d2db92bf8c89bb0fc1c47c78c85630ae9704680cbdb13842cbdcb8cf31088e8e  scripts/test-ticket-view-controller-contract.mjs
          51b4dc348a0869b5b785e99314e417eacf07382890d6774437cefcd04291f515  scripts/test-dashboard-controller-contract.mjs
          0ae0757399860c333574276367cbb80d0b9da3e634fc2e5b9897dfae73696435  scripts/test-app-controller-contract.mjs
          5c0517a002008f49a3932810b9340167a7a862d9ebb857bc7870ffca98c77820  scripts/test-bootstrap-contract.mjs
          b86caddabd24dc77d94a1280cebc8627cdda77f520b1546bc33eaf96206ed91d  scripts/test-controller-lifecycle-integration.mjs
          EOF
          sha256sum -c gate4-expected-sha256.txt
      - name: Check canonical JavaScript syntax
        run: npm run check:syntax
      - name: Build gold and silver from canonical source
        run: npm run build
      - name: Verify canonical architecture
        run: npm run verify:architecture
      - name: Verify prior component contracts
        run: npm run test:components && npm run test:tracker
      - name: Verify all Gate 4 controller contracts
        run: npm run test:controllers
      - name: Run canonical regression suite
        run: npm run test:regressions
      - name: Verify canonical hosting contract
        run: npm run verify:hosting
      - name: Verify integrated package pipeline
        run: npm test
      - name: Verify generated application parity
        run: |
          set -euo pipefail
          for file in build/gold/*.js; do cmp "$file" "build/silver/$(basename "$file")"; done
          cmp build/gold/app.css build/silver/app.css
          cmp build/gold/dashboard.css build/silver/dashboard.css
      - name: Produce Gate 4 evidence
        run: |
          set -euo pipefail
          sha256sum \
            app/src/scripts/builder-controller.js \
            app/src/scripts/sharing-controller.js \
            app/src/scripts/ticket-view-controller.js \
            app/src/scripts/dashboard-controller.js \
            app/src/scripts/app-controller.js \
            app/src/scripts/bootstrap.js \
            scripts/test-sharing-controller-contract.mjs \
            scripts/test-ticket-view-controller-contract.mjs \
            scripts/test-dashboard-controller-contract.mjs \
            scripts/test-app-controller-contract.mjs \
            scripts/test-bootstrap-contract.mjs \
            scripts/test-controller-lifecycle-integration.mjs \
            package.json > gate4-final-sha256.txt
          find build/gold -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > gate4-gold-build-sha256.txt
          find build/silver -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > gate4-silver-build-sha256.txt
          cp build/gold/BUILD.json gate4-gold-BUILD.json
          cp build/silver/BUILD.json gate4-silver-BUILD.json
          date -u +%Y-%m-%dT%H:%M:%SZ > gate4-audited-at.txt
      - name: Upload Gate 4 final evidence
        uses: actions/upload-artifact@v4
        with:
          name: gate4-component-audit-evidence-final
          retention-days: 90
          path: |
            gate4-head.txt
            gate4-main-head.txt
            gate4-changed-paths.txt
            gate4-expected-sha256.txt
            gate4-final-sha256.txt
            gate4-gold-build-sha256.txt
            gate4-silver-build-sha256.txt
            gate4-gold-BUILD.json
            gate4-silver-BUILD.json
            gate4-audited-at.txt
          if-no-files-found: error
