name: Apply Gate 4 corrections

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/canonical-app-architecture' || github.ref_name == 'agent/canonical-app-architecture'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact branch head
        uses: actions/checkout@v4
        with:
          ref: agent/canonical-app-architecture
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify branch isolation and unchanged live head
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "agent/canonical-app-architecture"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "d896165380191e4b9876f2ea99386808c937ec8a"
      - name: Verify staged patches and untouched source bytes
        run: |
          set -euo pipefail
          cat > /tmp/gate4-patches.sha256 <<'EOF'
          2c7eb2d42175355ce896ceefe652323c9254eebde687fb8a1d0bf752ddb0ce6e  .gate4/builder.patch
          899b318b6cbe40bc1f4d8f5b6cdde294716af4198efe751e95406a32804aae88  .gate4/sharing.patch
          0cdf98937718040e0419aad8592a88c3510cd5b627d3020ff67b25bff7149567  .gate4/ticket-view.patch
          9d28a7b5572e44ae6c054d3c8fe4b52ade000a5b3caa8611cad528338abc03d6  .gate4/dashboard.patch
          ba8959ac9ac8f2e29034a2010dfb85a840447f6a0909292e39cd91d096656122  .gate4/app.patch
          89034649bd5573c74056f2b02e57cadd552d0346a3033ce12ea76525ade93e0f  .gate4/bootstrap.patch
          6c4fb0c3738b5e4e9480f48607e8fecda6ac5ed5d2b644647bf67ccbf08df30c  .gate4/package.patch
          EOF
          sha256sum -c /tmp/gate4-patches.sha256
          cat > /tmp/gate4-before.sha256 <<'EOF'
          209fcd70d403868122f4dafc12e49ab755023a497be7f6a8ceea533f377359e8  app/src/scripts/builder-controller.js
          83e15bd526f3c0f2aa08c96e2f7c98788515d34a84dbc54dc282ef16ba62cf84  app/src/scripts/sharing-controller.js
          c73363048d4c06a8185748d3d95aeb575668fa88829b7bc29d1a14902284e547  app/src/scripts/ticket-view-controller.js
          c9c29f5fe834bb019a68b8856aebaebd7dc25e3ec291fc1586fbd44d50107ee2  app/src/scripts/dashboard-controller.js
          ef24cfbcbc11894cf9bbe4c9e9c07acbf2cb8cdf5c32a4df0687e525ddec3823  app/src/scripts/app-controller.js
          3e4b0e482d155b6c800669dac8cbbfd2a7fb78a440b583dffc472caa179e7cd4  app/src/scripts/bootstrap.js
          340f782eb5ed414c8a1556a3c96751cf8b19576261ef571a2c654b2b8db3d826  package.json
          EOF
          sha256sum -c /tmp/gate4-before.sha256
      - name: Apply complete Gate 4 correction set
        run: |
          set -euo pipefail
          for patch in builder sharing ticket-view dashboard app bootstrap package; do
            git apply --check ".gate4/${patch}.patch"
            git apply ".gate4/${patch}.patch"
          done
      - name: Verify exact corrected bytes
        run: |
          set -euo pipefail
          cat > /tmp/gate4-after.sha256 <<'EOF'
          ab581ec1f05a5029eb247cf210456c3be6e334a54fd9ab8d0dd33dcd1d539574  app/src/scripts/builder-controller.js
          7ead09345f6b0c65cc14f450e3401665fdbbeff8e1069395cae81b0e4cd95826  app/src/scripts/sharing-controller.js
          9a15396bb6240e80812c5f9c7c04e34cb652f0683918f853b3aa19e17237691a  app/src/scripts/ticket-view-controller.js
          f5d95ee90a1a07e47a519a635ac3bdc6139afffd35a07b7bf492ee888b8b7170  app/src/scripts/dashboard-controller.js
          1ceb046de80502d6dcfc593d0d197223eaef9a0cc3d268eba4a59f43d93f72af  app/src/scripts/app-controller.js
          f72737bd9ee733df162760f4be82f01cef4b63aba3ead00a53ee6e63b6ffe567  app/src/scripts/bootstrap.js
          d9bf92ee32977f26489ae3eeee02f62ec3e27ace845b0aef8ab19d53339a6b86  package.json
          EOF
          sha256sum -c /tmp/gate4-after.sha256
      - name: Verify Gate 4 contracts
        run: npm run test:controllers
      - name: Verify complete canonical suite
        run: npm test
      - name: Commit corrected source and remove one-use machinery
        run: |
          set -euo pipefail
          rm -rf .gate4 .github/workflows/gate4-apply-corrections.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Apply Gate 4 controller lifecycle corrections"
          git push origin HEAD:agent/canonical-app-architecture
