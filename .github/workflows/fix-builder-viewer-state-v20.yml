name: Fix builder and viewer state

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/fix-builder-viewer-state-v20.js
      - .github/workflows/fix-builder-viewer-state-v20.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply state corrections
        run: node .github/scripts/fix-builder-viewer-state-v20.js
      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Fix builder draft and viewer window behavior"
          git push
