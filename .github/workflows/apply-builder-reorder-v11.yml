name: Apply centered reorder and drag lock

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/scripts/apply-builder-fixes-v11.js
      - .github/workflows/apply-builder-reorder-v11.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply reorder stabilization patch
        run: node .github/scripts/apply-builder-fixes-v11.js
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Center reorder handle and lock drag scrolling"
          git push
