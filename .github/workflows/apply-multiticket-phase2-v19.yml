name: Apply Phase 2 multi-ticket foundation

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/apply-multiticket-phase2-v19.js
      - .github/workflows/apply-multiticket-phase2-v19.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply multi-ticket foundation
        run: node .github/scripts/apply-multiticket-phase2-v19.js
      - name: Commit Phase 2 foundation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Add persistent multi-ticket dashboard"
          git push
