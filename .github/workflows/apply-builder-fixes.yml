name: Apply builder fixes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch index.html
        shell: python
        run: |
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          marker = "</script>"
          if marker not in text:
              raise SystemExit("closing script tag not found")

          start = "<!-- BUILDER_FIXES_V3_START -->"
          end = "<!-- BUILDER_FIXES_V3_END -->"
          if start in text and end in text:
              a = text.index(start)
              b = text.index(end) + len(end)
              text = text[:a] + text[b:]

          patch = r'''
<!-- BUILDER_FIXES_V3_START -->
<script>
/* Canonical label override and real touch drag reorder. */
function trackerLineFromTarget(raw) {
  const n = Number(raw);
  if (raw === "" || !Number.isFinite(n)) return "";
  return String(Number.isInteger(n) ? n - 0.5 : n);
}

function autoLabel(d) {
  const t = d.querySelector(".ltype").value;
  const team = legTeam(d);
  const player = legPlayer(d);
  const raw = clean(d.querySelector(".target").value);
  const line = trackerLineFromTarget(raw);

  if (t === "manual") return clean(d.querySelector(".lbl").value);
  if (t === "void") return "VOID";
  if (t === "draw") return "Draw";
  if (t === "h1_draw") return "H1 Draw";
  if (t === "btts_yes") return "BTTS Yes";
  if (t === "btts_no") return "BTTS No";

  if (["ml", "ml_et", "to_qualify", "f5_ml", "h1_ml"].includes(t)) {
    return [team, label[t] || t].filter(Boolean).join(" ");
  }

  if (t.includes("spread")) {
    return [team, raw].filter(Boolean).join(" ");
  }

  const isOver = t.endsWith("_over");
  const isUnder = t.endsWith("_under");
  if (isOver || isUnder) {
    const ou = (isOver ? "O" : "U") + line;
    const prefix = t.startsWith("team_") ? team : "";
    const period = t.startsWith("f5_") ? "F5 " : t.startsWith("h1_") ? "H1 " : t.startsWith("h2_") ? "H2 " : "";
    const stat = t.includes("corners") ? "Corners" : t.includes("cards") ? "Cards" : t.includes("shots") && !t.includes("sot") ? "Shots" : t.includes("sot") ? "SOT" : "";
    return [prefix, period + ou, stat].filter(Boolean).join(" ");
  }

  if (isPlayer(t)) {
    if (t === "pitcher_ks_under" || t === "pitcher_outs_under") {
      return [player, "U" + line, t === "pitcher_ks_under" ? "K" : "Outs"].filter(Boolean).join(" ");
    }

    const suffix = {
      player_hits: "H",
      player_total_bases: "TB",
      player_runs: "R",
      player_hr: "HR",
      player_rbi: "RBI",
      player_walks: "BB",
      player_stolen_bases: "SB",
      player_hwsb: "H+BB+SB",
      player_hrrbi: "H+R+RBI",
      pitcher_ks: "K",
      player_points: "PTS",
      player_rebounds: "REB",
      player_assists: "AST",
      player_threes: "3PM",
      player_blocks: "BLK",
      player_points_rebounds: "P+R",
      player_pr: "P+R",
      player_points_assists: "P+A",
      player_pa: "P+A",
      player_rebounds_assists: "R+A",
      player_ra: "R+A",
      player_points_rebounds_assists: "PRA",
      player_pra: "PRA",
      player_goal: "Goal",
      player_goal_et: "Goal",
      player_assist: "Assist",
      player_goal_or_assist: "G/A",
      player_sot: "SOT",
      player_shots: "Shots",
      player_fouls: "Fouls",
      player_fouls_drawn: "Fouls Drawn",
      player_tackles: "Tackles",
      player_cards: "Cards"
    }[t] || label[t] || "";

    if (t === "player_double_double" || t === "player_triple_double") {
      return [player, label[t]].filter(Boolean).join(" ");
    }

    return [player, raw ? raw + "+" : "", suffix].filter(Boolean).join(" ");
  }

  return label[t] || t;
}

/* Disable the old tap-to-move behavior. */
function moveLeg() {}

let dragLeg = null;
let dragPointerId = null;

function prepareGrip(handle) {
  if (!handle) return;
  handle.removeAttribute("onclick");
  handle.setAttribute("title", "Drag to reorder");
  handle.setAttribute("aria-label", "Drag to reorder leg");
  handle.style.touchAction = "none";
  handle.style.cursor = "grab";
  handle.style.userSelect = "none";
  handle.style.webkitUserSelect = "none";
}

function prepareAllGrips(root = document) {
  root.querySelectorAll?.(".grip").forEach(prepareGrip);
}

function beginLegDrag(e) {
  const handle = e.target.closest(".grip");
  if (!handle || handle.classList.contains("hide")) return;
  const leg = handle.closest(".leg");
  if (!leg) return;
  e.preventDefault();
  prepareGrip(handle);
  dragLeg = leg;
  dragPointerId = e.pointerId;
  dragLeg.style.opacity = ".78";
  dragLeg.style.position = "relative";
  dragLeg.style.zIndex = "20";
  handle.setPointerCapture?.(e.pointerId);
  document.body.style.userSelect = "none";
}

function moveLegDrag(e) {
  if (!dragLeg || e.pointerId !== dragPointerId) return;
  e.preventDefault();
  const siblings = [...document.querySelectorAll("#legs > .leg")].filter(x => x !== dragLeg);
  let before = null;
  for (const item of siblings) {
    const r = item.getBoundingClientRect();
    item.style.boxShadow = "";
    if (before === null && e.clientY < r.top + r.height / 2) before = item;
  }
  if (before) {
    before.style.boxShadow = "0 -3px 0 #c89232";
    $("legs").insertBefore(dragLeg, before);
  } else {
    $("legs").appendChild(dragLeg);
  }
}

function endLegDrag(e) {
  if (!dragLeg || e.pointerId !== dragPointerId) return;
  e.preventDefault();
  document.querySelectorAll("#legs > .leg").forEach(x => x.style.boxShadow = "");
  dragLeg.style.opacity = "";
  dragLeg.style.position = "";
  dragLeg.style.zIndex = "";
  dragLeg = null;
  dragPointerId = null;
  document.body.style.userSelect = "";
  renumber();
  updateMultiControls();
  preview();
}

const gripObserver = new MutationObserver(() => prepareAllGrips());
gripObserver.observe(document.documentElement, { childList: true, subtree: true });
prepareAllGrips();
document.addEventListener("pointerdown", beginLegDrag, { passive: false, capture: true });
document.addEventListener("pointermove", moveLegDrag, { passive: false });
document.addEventListener("pointerup", endLegDrag, { passive: false });
document.addEventListener("pointercancel", endLegDrag, { passive: false });
</script>
<!-- BUILDER_FIXES_V3_END -->
'''

          text = text.replace(marker, marker + patch, 1)
          path.write_text(text, encoding="utf-8")

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Apply drag reorder and canonical labels"
          git push
