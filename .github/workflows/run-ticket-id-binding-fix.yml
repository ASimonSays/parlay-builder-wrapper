name: Run dashboard ticket ID binding fix

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .ticket-id-binding-fix-trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Bind dashboard data by ticket ID
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p=Path(path)
              text=p.read_text()
              count=text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one target, found {count}')
              p.write_text(text.replace(old,new,1))

          replace_once(
              'ticket-dashboard-details-v54.js',
              """    const cards=[...document.querySelectorAll('#ticketList .savedTicket')];
    cards.forEach((card,index)=>{
      const record=records[index];if(!record)return;
      card.dataset.ticketId=record.id;""",
              """    const cards=[...document.querySelectorAll('#ticketList .savedTicket')],recordsById=new Map(records.map(record=>[String(record.id||''),record]));
    cards.forEach((card,index)=>{
      const existingId=String(card.dataset.ticketId||'');
      const record=(existingId&&recordsById.get(existingId))||records[index];if(!record)return;
      if(!existingId||!recordsById.has(existingId))card.dataset.ticketId=record.id;"""
          )

          replace_once(
              'actual-settlement-time.js',
              """    const records=id?list.filter(r=>r.id===id):active?list.filter(r=>r.status!=='completed'||document.querySelector('.liveTicketCard')):[];
    [...document.querySelectorAll('#standaloneView .liveTicketCard')].forEach((card,i)=>{
      const r=records[i];card.querySelector('.settlementStamp')?.remove();if(!r?.settledAt)return;""",
              """    const records=id?list.filter(r=>r.id===id):active?list.filter(r=>r.status!=='completed'):[];
    const recordsById=new Map(records.map(record=>[String(record.id||''),record]));
    [...document.querySelectorAll('#standaloneView .liveTicketCard')].forEach((card,i)=>{
      const cardId=String(card.dataset.ticketId||''),r=(cardId&&recordsById.get(cardId))||records[i];card.querySelector('.settlementStamp')?.remove();if(!r?.settledAt)return;"""
          )

          replace_once('index.html','s.src="./actual-settlement-time.js?v=120"','s.src="./actual-settlement-time.js?v=122"')
          replace_once('index.html',"html=html.replace('./ticket-dashboard-details-v54.js?v=82','./ticket-dashboard-details-v54.js?v=112');","html=html.replace('./ticket-dashboard-details-v54.js?v=82','./ticket-dashboard-details-v54.js?v=122');")

          test=Path('scripts/test-ticket-id-binding-regression.mjs')
          test.write_text(r'''#!/usr/bin/env node
          import assert from 'node:assert/strict';
          import {readFileSync} from 'node:fs';

          const dashboard=readFileSync(new URL('../ticket-dashboard-details-v54.js',import.meta.url),'utf8');
          const settlement=readFileSync(new URL('../actual-settlement-time.js',import.meta.url),'utf8');
          const index=readFileSync(new URL('../index.html',import.meta.url),'utf8');

          assert.match(dashboard,/recordsById=new Map/);
          assert.match(dashboard,/existingId&&recordsById\.get\(existingId\)/);
          assert.doesNotMatch(dashboard,/const record=records\[index\];if\(!record\)return;\s*card\.dataset\.ticketId=record\.id/);
          assert.match(settlement,/active\?list\.filter\(r=>r\.status!=='completed'\):\[\]/);
          assert.match(settlement,/cardId&&recordsById\.get\(cardId\)/);
          assert.doesNotMatch(settlement,/r\.status!=='completed'\|\|document\.querySelector/);
          assert.match(index,/actual-settlement-time\.js\?v=122/);
          assert.match(index,/ticket-dashboard-details-v54\.js\?v=122/);

          const records=[{id:'2000'},{id:'1718'},{id:'1043'},{id:'1969'}];
          const visibleCards=['1043','1969','2000','1718'].map(ticketId=>({dataset:{ticketId}}));
          const byId=new Map(records.map(record=>[record.id,record]));
          const resolved=visibleCards.map((card,index)=>{
            const existingId=String(card.dataset.ticketId||'');
            return ((existingId&&byId.get(existingId))||records[index]).id;
          });
          assert.deepEqual(resolved,['1043','1969','2000','1718']);

          const active=[{id:'2000',status:'active'},{id:'1718',status:'active'}];
          const activeById=new Map(active.map(record=>[record.id,record]));
          const activeCards=['2000','1718'].map(ticketId=>({dataset:{ticketId}}));
          assert.deepEqual(activeCards.map((card,index)=>((activeById.get(card.dataset.ticketId)||active[index]).id)),['2000','1718']);

          console.log('Dashboard ticket ID binding regression verified.');
          ''').write_text if False else None
          PY

      - name: Write regression test
        shell: bash
        run: |
          cat > scripts/test-ticket-id-binding-regression.mjs <<'EOF'
          #!/usr/bin/env node
          import assert from 'node:assert/strict';
          import {readFileSync} from 'node:fs';

          const dashboard=readFileSync(new URL('../ticket-dashboard-details-v54.js',import.meta.url),'utf8');
          const settlement=readFileSync(new URL('../actual-settlement-time.js',import.meta.url),'utf8');
          const index=readFileSync(new URL('../index.html',import.meta.url),'utf8');

          assert.match(dashboard,/recordsById=new Map/);
          assert.match(dashboard,/existingId&&recordsById\.get\(existingId\)/);
          assert.doesNotMatch(dashboard,/const record=records\[index\];if\(!record\)return;\s*card\.dataset\.ticketId=record\.id/);
          assert.match(settlement,/active\?list\.filter\(r=>r\.status!=='completed'\):\[\]/);
          assert.match(settlement,/cardId&&recordsById\.get\(cardId\)/);
          assert.doesNotMatch(settlement,/r\.status!=='completed'\|\|document\.querySelector/);
          assert.match(index,/actual-settlement-time\.js\?v=122/);
          assert.match(index,/ticket-dashboard-details-v54\.js\?v=122/);

          const records=[{id:'2000'},{id:'1718'},{id:'1043'},{id:'1969'}];
          const visibleCards=['1043','1969','2000','1718'].map(ticketId=>({dataset:{ticketId}}));
          const byId=new Map(records.map(record=>[record.id,record]));
          const resolved=visibleCards.map((card,index)=>{
            const existingId=String(card.dataset.ticketId||'');
            return ((existingId&&byId.get(existingId))||records[index]).id;
          });
          assert.deepEqual(resolved,['1043','1969','2000','1718']);

          const active=[{id:'2000',status:'active'},{id:'1718',status:'active'}];
          const activeById=new Map(active.map(record=>[record.id,record]));
          const activeCards=['2000','1718'].map(ticketId=>({dataset:{ticketId}}));
          assert.deepEqual(activeCards.map((card,index)=>(activeById.get(card.dataset.ticketId)||active[index]).id),['2000','1718']);

          console.log('Dashboard ticket ID binding regression verified.');
          EOF

      - name: Verify repair
        shell: bash
        run: |
          node --check ticket-dashboard-details-v54.js
          node --check actual-settlement-time.js
          node scripts/test-ticket-id-binding-regression.mjs
          node scripts/verify-hosting-contract.mjs

      - name: Commit repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add ticket-dashboard-details-v54.js actual-settlement-time.js index.html scripts/test-ticket-id-binding-regression.mjs
          git commit -m "Bind dashboard cards and stamps by ticket ID"
          git push origin HEAD:${{ github.head_ref }}
