name: Rebuild target selector

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/rebuild-target-selector-v15.js
      - .github/workflows/rebuild-target-selector-v15.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild target selection
        run: node .github/scripts/rebuild-target-selector-v15.js
      - name: Commit rebuilt target selector
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Rebuild market-aware target selection"
          git push
