name: Full pre-cutover audit

on:
  push:
    paths:
      - .github/workflows/full-precutover-audit.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out app repo
        uses: actions/checkout@v4
        with:
          path: app
          fetch-depth: 0

      - name: Check out root repo
        uses: actions/checkout@v4
        with:
          repository: SuperL0ng/SuperL0ng.github.io
          path: root
          fetch-depth: 0

      - name: Audit both deployments
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json, re, subprocess, sys

          APP=Path('app')
          ROOT=Path('root')
          issues=[]
          notes=[]

          def text_files(base):
            skip={'.git','node_modules'}
            for p in base.rglob('*'):
              if not p.is_file() or any(part in skip for part in p.parts):
                continue
              try:
                data=p.read_text()
              except Exception:
                continue
              yield p,data

          def record(condition,msg):
            if not condition: issues.append(msg)

          def print_refs(label,base):
            print(f'\n===== {label}: DOMAIN / HOST REFERENCES =====')
            patterns=(
              'simonsportsbetting.com',
              'simonsports.bet',
              'superl0ng.github.io/parlay-tracker',
              'raw.githubusercontent.com/SuperL0ng/parlay-tracker',
            )
            found=0
            for p,data in text_files(base):
              for i,line in enumerate(data.splitlines(),1):
                if any(token.lower() in line.lower() for token in patterns):
                  print(f'{p.relative_to(base)}:{i}: {line[:500]}')
                  found+=1
            print(f'TOTAL REFERENCE LINES: {found}')

          print('APP SHA:', subprocess.check_output(['git','-C',str(APP),'rev-parse','HEAD'],text=True).strip())
          print('ROOT SHA:', subprocess.check_output(['git','-C',str(ROOT),'rev-parse','HEAD'],text=True).strip())
          print_refs('APP REPO',APP)
          print_refs('ROOT REPO',ROOT)

          app_cname=(APP/'CNAME').read_text().strip()
          root_cname=(ROOT/'CNAME').read_text().strip()
          print('\n===== CURRENT CNAME STATE =====')
          print('app CNAME :',app_cname)
          print('root CNAME:',root_cname)
          record(app_cname=='simonsportsbetting.com','Current app CNAME is not simonsportsbetting.com')
          record(root_cname=='simonsports.bet','Current root CNAME is not simonsports.bet')

          app_index=(APP/'index.html').read_text()
          root_index=(ROOT/'index.html').read_text()

          print('\n===== ROOT INDEPENDENCE =====')
          forbidden_root={
            '<base':'Root still contains a <base> element',
            'document.write':'Root still contains document.write',
            'raw.githubusercontent.com/SuperL0ng/parlay-tracker':'Root still fetches the app source at runtime',
            'superl0ng.github.io/parlay-tracker':'Root still references app-repo hosting paths',
            'simonsportsbetting.com':'Root still references the current app domain',
            'ssb-gold':'Root still references gold icon assets',
            'manifest-gold':'Root still references the gold manifest',
          }
          for token,msg in forbidden_root.items():
            record(token not in root_index,msg)
            print(f'{token}:', 'ABSENT' if token not in root_index else 'FOUND')

          record('silverRootHost' in root_index,'Root silver-host treatment is missing')
          record('simon-sports-betting-nameplate.png' in root_index,'Root header nameplate reference is missing')
          record((ROOT/'simon-sports-betting-nameplate.png').exists(),'Root nameplate file is missing')
          record((ROOT/'ssb_emblem_webapp_box_transparent_768.png').exists(),'Root compact emblem file is missing')
          record((ROOT/'view-fixes.js').exists(),'Root view-fixes.js is missing')
          if (ROOT/'view-fixes.js').exists():
            vf=(ROOT/'view-fixes.js').read_text()
            record("logo.src='./simon-sports-betting-nameplate.png" in vf,'Root view-fixes does not restore local nameplate')
            record("logo.src='./ssb_emblem_webapp_box_transparent_768.png" in vf,'Root view-fixes does not use local compact emblem')

          local_refs=set()
          for attr,path in re.findall(r'\b(src|href)=["\']\.\/([^"\'#?]+)',root_index,re.I):
            local_refs.add(path)
          for path in sorted(local_refs):
            exists=(ROOT/path).exists()
            print('ROOT LOCAL',path,'OK' if exists else 'MISSING')
            record(exists,f'Root local reference is missing: {path}')

          print('\n===== MANIFESTS =====')
          for label,repo,name,expected_theme in [
            ('APP GOLD',APP,'manifest-gold-v1.json','#c79442'),
            ('ROOT SILVER',ROOT,'manifest.json','#d7dde6'),
          ]:
            p=repo/name
            record(p.exists(),f'{label} manifest missing: {name}')
            if not p.exists(): continue
            data=json.loads(p.read_text())
            print(label,data)
            record(data.get('theme_color')==expected_theme,f'{label} theme_color is not {expected_theme}')
            record(data.get('start_url')=='/',f'{label} start_url is not /')
            for icon in data.get('icons',[]):
              icon_path=icon.get('src','').split('?',1)[0]
              if icon_path.startswith('./'): icon_path=icon_path[2:]
              if icon_path.startswith('/'):
                icon_path=icon_path[1:]
              exists=(repo/icon_path).exists()
              print(label,'ICON',icon_path,'OK' if exists else 'MISSING')
              record(exists,f'{label} manifest icon missing: {icon_path}')

          print('\n===== APP TRANSITION STATE =====')
          record("['simonsportsbetting.com','simonsports.bet']" in app_index,'App is not currently protected for both transition hosts')
          record('ssb-gold-v1' in app_index,'App gold icon configuration is missing')
          record((APP/'library-backup.js').exists(),'App library backup module is missing')
          record('data-library-backup' in (APP/'navigation-links-v24.js').read_text(),'App does not load library backup module')
          record((ROOT/'library-backup.js').exists(),'Root library backup module is missing')
          record('data-library-backup' in (ROOT/'navigation-links-v24.js').read_text(),'Root does not load library backup module')

          print('\n===== JAVASCRIPT SYNTAX =====')
          for label,repo in [('APP',APP),('ROOT',ROOT)]:
            for p in sorted(repo.rglob('*.js')):
              if '.git' in p.parts or 'node_modules' in p.parts: continue
              result=subprocess.run(['node','--check',str(p)],capture_output=True,text=True)
              if result.returncode:
                print(label,'FAIL',p.relative_to(repo),result.stderr)
                issues.append(f'{label} JavaScript syntax failure: {p.relative_to(repo)}')
            print(label,'JavaScript syntax scan complete')

          print('\n===== EXPECTED PRE-CUTOVER ITEMS =====')
          pending=[]
          if 'https://superl0ng.github.io/parlay-tracker/' in app_index:
            pending.append('App identity/social metadata still uses the GitHub Pages project URL')
          verifier=APP/'scripts/verify-hosting-contract.mjs'
          if verifier.exists() and 'https://superl0ng.github.io/parlay-tracker/' in verifier.read_text():
            pending.append('App hosting verifier still enforces the old GitHub Pages project URL')
          if 'https://simonsports.bet/' in root_index:
            pending.append('Root social metadata still identifies the current .bet domain')
          if app_cname!='simonsports.bet':
            pending.append('App CNAME has not yet been switched to simonsports.bet')
          if root_cname!='simonsportsbetting.com':
            pending.append('Root CNAME has not yet been switched to simonsportsbetting.com')
          for item in pending:
            print('PENDING:',item)

          print('\n===== AUDIT RESULT =====')
          if issues:
            print('STRUCTURAL ISSUES:')
            for x in issues: print('-',x)
            sys.exit(1)
          print('No structural failures found.')
          print('Pending items are deliberate cutover tasks and must be handled atomically after both ticket-library exports.')
          PY
