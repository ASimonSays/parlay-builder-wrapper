name: Fix Phase 1 regressions

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/fix-phase1-regressions-v17.js
      - .github/workflows/fix-phase1-regressions-v17.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply Phase 1 regression corrections
        run: node .github/scripts/fix-phase1-regressions-v17.js
      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Fix Phase 1 output regressions"
          git push
