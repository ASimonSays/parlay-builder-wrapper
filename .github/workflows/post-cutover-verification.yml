name: Post-cutover verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out app repo
        uses: actions/checkout@v4
        with:
          path: app
          fetch-depth: 0

      - name: Check out root repo
        uses: actions/checkout@v4
        with:
          repository: SuperL0ng/SuperL0ng.github.io
          path: root
          fetch-depth: 0

      - name: Verify repository contracts
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat app/CNAME)" = "simonsports.bet"
          test "$(cat root/CNAME)" = "simonsportsbetting.com"
          node app/scripts/verify-hosting-contract.mjs
          node root/scripts/verify-root-deployment.mjs
          find app -path 'app/.git' -prune -o -name '*.js' -type f -print0 | xargs -0 -n1 node --check
          find root -path 'root/.git' -prune -o -name '*.js' -type f -print0 | xargs -0 -n1 node --check

      - name: Capture live-domain diagnostics
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          for host in simonsports.bet simonsportsbetting.com; do
            {
              echo "===== $host ====="
              echo "--- getent ---"
              getent ahosts "$host"
              echo "--- dig A ---"
              dig +noall +answer "$host" A
              echo "--- dig CNAME ---"
              dig +noall +answer "$host" CNAME
              echo "--- curl headers ---"
              curl -sSIL --max-time 30 --connect-timeout 10 "https://$host/?diag=${GITHUB_RUN_ID}"
            } > "diagnostics/$host.txt" 2>&1
            curl -sSL --max-time 30 --connect-timeout 10 \
              -A 'Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 Version/18.0 Mobile/15E148 Safari/604.1' \
              -D "diagnostics/$host.headers" \
              -o "diagnostics/$host.html" \
              -w 'http_code=%{http_code}\neffective_url=%{url_effective}\nremote_ip=%{remote_ip}\n' \
              "https://$host/?diag=${GITHUB_RUN_ID}" > "diagnostics/$host.curl" 2>&1
          done

      - name: Upload live-domain diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-cutover-live-diagnostics
          path: diagnostics
          if-no-files-found: error

      - name: Verify live domain identities and assets
        shell: bash
        run: |
          set -euo pipefail
          bet_url="$(sed -n 's/^effective_url=//p' diagnostics/simonsports.bet.curl)"
          com_url="$(sed -n 's/^effective_url=//p' diagnostics/simonsportsbetting.com.curl)"
          bet_code="$(sed -n 's/^http_code=//p' diagnostics/simonsports.bet.curl)"
          com_code="$(sed -n 's/^http_code=//p' diagnostics/simonsportsbetting.com.curl)"
          echo "BET: code=$bet_code url=$bet_url"
          echo "COM: code=$com_code url=$com_url"

          test "$bet_code" = "200"
          test "$com_code" = "200"
          [[ "$bet_url" == https://simonsports.bet/* ]]
          [[ "$com_url" == https://simonsportsbetting.com/* ]]
          grep -q 'ssb-gold-v1.ico' diagnostics/simonsports.bet.html
          grep -q 'https://simonsports.bet/' diagnostics/simonsports.bet.html
          grep -q 'const goldHost=true' diagnostics/simonsports.bet.html
          grep -q 'silverRootHost' diagnostics/simonsportsbetting.com.html
          grep -q 'https://simonsportsbetting.com/' diagnostics/simonsportsbetting.com.html
          grep -q 'favicon.ico?v=silver-root-4' diagnostics/simonsportsbetting.com.html

          curl -fsSIL --max-time 25 https://simonsports.bet/ssb-gold-v1.ico >/dev/null
          curl -fsSIL --max-time 25 https://simonsports.bet/manifest-gold-v1.json >/dev/null
          curl -fsSIL --max-time 25 https://simonsports.bet/simon-sports-betting-nameplate.png >/dev/null
          curl -fsSIL --max-time 25 https://simonsports.bet/ssb_emblem_webapp_box_transparent_768.png >/dev/null
          curl -fsSIL --max-time 25 https://simonsportsbetting.com/favicon.ico >/dev/null
          curl -fsSIL --max-time 25 https://simonsportsbetting.com/manifest.json >/dev/null
          curl -fsSIL --max-time 25 https://simonsportsbetting.com/simon-sports-betting-nameplate.png >/dev/null
          curl -fsSIL --max-time 25 https://simonsportsbetting.com/ssb_emblem_webapp_box_transparent_768.png >/dev/null

          echo 'Post-cutover live verification passed.'
