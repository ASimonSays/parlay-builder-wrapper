name: Gate 3 component audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact audited commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Record exact head
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee gate3-head.txt
          git diff --name-only origin/main...HEAD | tee gate3-changed-paths.txt
      - name: Run current canonical suite
        run: npm test
