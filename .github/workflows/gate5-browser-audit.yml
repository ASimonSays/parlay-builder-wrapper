name: Gate 5 final browser audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact audited commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify exact commit, isolation, and path hygiene
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee gate5-head.txt
          git rev-parse origin/main | tee gate5-main-head.txt
          test "$(git rev-parse origin/main)" = "d896165380191e4b9876f2ea99386808c937ec8a"
          git diff --name-only origin/main...HEAD | tee gate5-changed-paths.txt
          bad="$(git diff --name-only origin/main...HEAD | grep -Ev '^(app/|scripts/|tests/|architecture/|playwright\.config\.mjs$|package\.json$|package-lock\.json$|\.gitignore$|\.github/workflows/gate5-browser-audit\.yml$)' || true)"
          test -z "$bad"
          test -z "$(git ls-files build)"
          test ! -e .gate5
          test ! -e .github/workflows/apply-gate5-corrections.yml
      - name: Verify exact corrected Git objects
        run: |
          set -euo pipefail
          cat > gate5-expected-git-objects.txt <<'EOF'
          f483259089631ab94d8346323302b6ba26b1a5cc  app/src/index.template.html
          00e9ca3ec0d7b62ca0deed98017d0a2c08a9142a  app/src/scripts/dashboard-controller.js
          b05d5a5aff1c13f23ee722cbed383a94a9d4a012  app/src/scripts/ticket-view-controller.js
          6b49c804f3697028425d42c3f2d1eeecd60f445c  app/src/scripts/sharing-controller.js
          a95d86a1047f088d712559d913e598daa71ace1e  app/src/styles/app.css
          dc255e59420443f119299f271f6170fead6af293  scripts/test-mobile-platform-contract.mjs
          b3e25ae91a2d0669fcfac29373fcdbeeda36f33f  tests/browser/gate5.spec.mjs
          2c3aeae941568f30369c69ee2b4f3f585aef4ad6  playwright.config.mjs
          00d3c44b7723599d1cbb934da59a98a749454abb  package.json
          33029da8a9d3c231187822235d85a1a6114f3247  package-lock.json
          73182fd1e25cff19bcd034f55ecf658f950d7833  .gitignore
          EOF
          while read -r expected path; do
            actual="$(git hash-object "$path")"
            test "$actual" = "$expected" || { echo "$path expected $expected got $actual" >&2; exit 1; }
          done < gate5-expected-git-objects.txt
      - name: Install exact dependencies and browser engines
        run: |
          npm ci
          npx playwright install --with-deps chromium webkit
      - name: Check canonical JavaScript syntax
        run: npm run check:syntax
      - name: Build gold and silver from canonical source
        run: npm run build
      - name: Verify canonical architecture
        run: npm run verify:architecture
      - name: Verify all prior component and tracker contracts
        run: npm run test:components && npm run test:tracker && npm run test:controllers && npm run test:regressions
      - name: Verify mobile platform contract
        run: npm run test:mobile-platform
      - name: Verify browser, compatibility, and adversarial contracts
        run: npm run test:browser
      - name: Verify canonical hosting contract
        run: npm run verify:hosting
      - name: Verify integrated package pipeline
        run: npm test
      - name: Verify generated gold and silver parity
        run: |
          set -euo pipefail
          for file in build/gold/*.js; do cmp "$file" "build/silver/$(basename "$file")"; done
          cmp build/gold/app.css build/silver/app.css
          cmp build/gold/dashboard.css build/silver/dashboard.css
      - name: Produce Gate 5 evidence
        run: |
          set -euo pipefail
          sha256sum \
            app/src/index.template.html \
            app/src/scripts/dashboard-controller.js \
            app/src/scripts/ticket-view-controller.js \
            app/src/scripts/sharing-controller.js \
            app/src/styles/app.css \
            scripts/test-mobile-platform-contract.mjs \
            tests/browser/gate5.spec.mjs \
            playwright.config.mjs \
            package.json \
            package-lock.json \
            .gitignore > gate5-final-sha256.txt
          find build/gold -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > gate5-gold-build-sha256.txt
          find build/silver -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > gate5-silver-build-sha256.txt
          cp build/gold/BUILD.json gate5-gold-BUILD.json
          cp build/silver/BUILD.json gate5-silver-BUILD.json
          date -u +%Y-%m-%dT%H:%M:%SZ > gate5-audited-at.txt
      - name: Upload Gate 5 final evidence
        uses: actions/upload-artifact@v4
        with:
          name: gate5-browser-audit-evidence-final
          retention-days: 90
          if-no-files-found: error
          path: |
            gate5-head.txt
            gate5-main-head.txt
            gate5-changed-paths.txt
            gate5-expected-git-objects.txt
            gate5-final-sha256.txt
            gate5-gold-build-sha256.txt
            gate5-silver-build-sha256.txt
            gate5-gold-BUILD.json
            gate5-silver-BUILD.json
            gate5-audited-at.txt
            gate5-playwright-results.json
