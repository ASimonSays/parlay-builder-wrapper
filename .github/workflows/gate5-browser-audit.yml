name: Gate 5 hash capture

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact corrected head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify isolation and print exact SHA-256 values
        run: |
          set -euo pipefail
          test "$(git rev-parse origin/main)" = "d896165380191e4b9876f2ea99386808c937ec8a"
          sha256sum \
            app/src/index.template.html \
            app/src/scripts/dashboard-controller.js \
            app/src/scripts/ticket-view-controller.js \
            app/src/scripts/sharing-controller.js \
            app/src/styles/app.css \
            scripts/test-mobile-platform-contract.mjs \
            tests/browser/gate5.spec.mjs \
            playwright.config.mjs \
            package.json \
            package-lock.json \
            .gitignore
