name: Apply domain preparation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Execute controlled preparation step
        shell: bash
        run: |
          ruby -ryaml -e '
            doc = YAML.load_file(".github/workflows/prepare-domain-swap.yml")
            step = doc.fetch("jobs").fetch("prepare").fetch("steps").find { |item| item["name"] == "Prepare dual-domain gold host and library backup" }
            abort("Preparation step not found") unless step && step["run"]
            File.write("/tmp/prepare-domain-swap.sh", step["run"])
          '
          bash /tmp/prepare-domain-swap.sh

      - name: Commit prepared app state
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html navigation-links-v24.js library-backup.js
          git commit -m "Prepare app for domain swap and library backup"
          git push origin HEAD:main
