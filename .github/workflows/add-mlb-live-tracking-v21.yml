name: Add MLB live tracking

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/add-mlb-live-tracking-v21.js
      - .github/workflows/add-mlb-live-tracking-v21.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply MLB live tracking milestone
        run: node .github/scripts/add-mlb-live-tracking-v21.js
      - name: Commit live tracking
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Add MLB live ticket refresh"
          git push

# retrigger after workflow creation
